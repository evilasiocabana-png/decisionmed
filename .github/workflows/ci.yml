name: tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Test DecisionMEd
        run: python -m unittest discover -s tests
      - name: Compile DecisionMEd
        run: python -m compileall -q decisionmed
      - name: Test PsychRx baseline
        working-directory: psychrx-baseline
        run: python -m unittest discover -s tests -t .
