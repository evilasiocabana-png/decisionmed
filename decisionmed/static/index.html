<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DecisionMEd</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;background:#f5f7fb;color:#172033}*{box-sizing:border-box}body{margin:0}
    header{background:linear-gradient(135deg,#14233f,#214f73);color:#fff;padding:38px max(24px,calc((100% - 1120px)/2))}header p{max-width:760px;color:#d6e7f4}
    main{max-width:1120px;margin:auto;padding:32px 24px 56px}.notice{background:#fff7df;border:1px solid #ead28a;border-radius:14px;padding:14px 18px;margin-bottom:26px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}.card{background:#fff;border:1px solid #dfe5ef;border-radius:18px;padding:22px;min-height:190px;box-shadow:0 8px 24px #1f32510f}
    .card h2{margin:12px 0 8px;font-size:1.18rem}.card p{color:#5d687a;line-height:1.45;min-height:42px}.tag{display:inline-block;border-radius:999px;padding:5px 9px;background:#edf0f5;color:#5b6472;font-size:.78rem;font-weight:700}.reference_only{background:#e8f5f0;color:#17684d}
    .button{display:inline-block;margin:10px 8px 0 0;padding:10px 14px;border-radius:10px;background:#176b84;color:#fff;text-decoration:none;font-weight:700}.secondary{background:#e9eef4;color:#29425d}footer{color:#697386;margin-top:30px;font-size:.9rem}
  </style>
</head>
<body>
  <header><h1>DecisionMEd</h1><p>Uma base segura para organizar fluxos de decisão por especialidade, com rastreabilidade e decisão final do médico.</p></header>
  <main><div class="notice"><strong>Ambiente de desenvolvimento read-only.</strong> Não prescreve e não substitui avaliação médica.</div><section class="grid" id="specialty-grid" aria-label="Especialidades"></section><footer id="platform-mode">Verificando estado da plataforma…</footer></main>
  <script>
    const descriptions={psychiatry:'Fluxo PsychRx preservado como implementação de referência.','internal-medicine':'Estrutura inicial para avaliação clínica geral.',cardiology:'Estrutura inicial para avaliação cardiovascular.',pediatrics:'Estrutura inicial para avaliação pediátrica.',neurology:'Estrutura inicial para avaliação neurológica.',emergency:'Estrutura inicial para contexto agudo e segurança.'};
    fetch('/api/app-state').then(r=>r.json()).then(state=>{const grid=document.getElementById('specialty-grid');state.specialties.forEach(item=>{const card=document.createElement('article');card.className='card';card.innerHTML=`<span class="tag ${item.load_status}">${item.load_status}</span><h2>${item.display_name}</h2><p>${descriptions[item.key]||'Fluxo estrutural da especialidade.'}</p><a class="button secondary" href="/workflow.html?specialty=${encodeURIComponent(item.key)}">Ver estrutura</a>${item.key==='psychiatry'?'<a class="button" href="/psychiatry">Abrir PsychRx</a>':''}`;grid.appendChild(card)});document.getElementById('platform-mode').textContent=`Modo: ${state.mode} · Execução clínica: bloqueada · Gates bloqueados: ${state.readiness.blocked_gate_count}`}).catch(()=>document.getElementById('platform-mode').textContent='Não foi possível consultar o estado local.');
  </script>
</body>
</html>
