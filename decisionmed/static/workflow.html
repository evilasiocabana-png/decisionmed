<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Fluxo | DecisionMEd</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;background:#f5f7fb;color:#172033}*{box-sizing:border-box}body{margin:0}main{max-width:900px;margin:auto;padding:28px 24px 56px}a{color:#176b84}.top{display:flex;align-items:center;justify-content:space-between;gap:16px}.tag{border-radius:999px;padding:6px 10px;background:#edf0f5;color:#5b6472;font-size:.78rem;font-weight:700}.notice{background:#fff7df;border:1px solid #ead28a;border-radius:12px;padding:14px 18px}.progress{height:8px;background:#e5eaf1;border-radius:999px;overflow:hidden;margin:24px 0 8px}.bar{height:100%;width:0;background:#176b84;transition:width .2s}.counter{color:#697386;font-size:.9rem}.panel{background:#fff;border:1px solid #dfe5ef;border-radius:18px;padding:24px;margin-top:18px;box-shadow:0 8px 24px #1f32510f}.capability{color:#697386;font-size:.85rem}label{display:block;margin:22px 0 8px;font-weight:700}textarea{width:100%;min-height:190px;border:1px solid #cbd4e1;border-radius:12px;padding:14px;font:inherit;resize:vertical}textarea:focus{outline:3px solid #176b8433;border-color:#176b84}.actions{display:flex;justify-content:space-between;gap:12px;margin-top:20px}.group{display:flex;gap:10px}.button{border:0;border-radius:10px;padding:11px 16px;background:#176b84;color:#fff;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}.secondary{background:#e9eef4;color:#29425d}.danger{background:#fff0f0;color:#9b3030}.button:disabled{opacity:.45;cursor:not-allowed}.summary{display:none}.summary li{margin:8px 0}.privacy{font-size:.85rem;color:#697386}
  </style>
</head>
<body>
  <main>
    <div class="top"><a href="/">← Catálogo</a><span class="tag" id="status">carregando</span></div>
    <h1 id="title">Fluxo da especialidade</h1>
    <p class="notice"><strong>Protótipo read-only.</strong> Organiza informações, mas não interpreta, recomenda nem prescreve.</p>
    <div id="workspace" hidden>
      <div class="progress"><div class="bar" id="bar"></div></div><div class="counter" id="counter"></div>
      <section class="panel" id="step-panel"><h2 id="step-title"></h2><div class="capability" id="capability"></div><label for="notes">Anotações estruturais</label><textarea id="notes" placeholder="Não insira dados que identifiquem pacientes neste protótipo."></textarea><p class="privacy">Anotações ficam somente na memória desta página. O servidor recebe apenas a chave da etapa concluída.</p></section>
      <section class="panel summary" id="summary"><h2>Revisão estrutural</h2><p>Nenhuma decisão clínica foi produzida.</p><ul id="summary-list"></ul><span id="psychrx-link"></span></section>
      <div class="actions"><div class="group"><button class="button secondary" id="previous">Anterior</button><button class="button danger" id="clear">Nova sessão</button></div><button class="button" id="next">Próximo</button></div>
    </div>
  </main>
  <script>
    const key=new URLSearchParams(location.search).get('specialty')||'';
    const draft={},notes=document.getElementById('notes'),nextButton=document.getElementById('next');
    let workflow,specialty,serverSession,index=0,busy=false;
    async function post(url,payload){const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!response.ok)throw new Error('session_request_failed');return response.json()}
    function save(){if(workflow&&index<workflow.steps.length)draft[workflow.steps[index].key]=notes.value}
    function render(){const steps=workflow.steps,review=index===steps.length;document.getElementById('bar').style.width=`${Math.min(index+1,steps.length)/steps.length*100}%`;document.getElementById('counter').textContent=review?'Revisão':`Etapa ${index+1} de ${steps.length}`;document.getElementById('step-panel').style.display=review?'none':'block';document.getElementById('summary').style.display=review?'block':'none';document.getElementById('previous').disabled=busy||index===0;nextButton.disabled=busy;nextButton.textContent=review?'Voltar ao início':index===steps.length-1?'Revisar':'Próximo';if(review){const list=document.getElementById('summary-list');list.replaceChildren();steps.forEach(step=>{const item=document.createElement('li');item.textContent=`${step.title}: ${draft[step.key]?.trim()?'preenchido':'não preenchido'}`;list.appendChild(item)});if(key==='psychiatry')document.getElementById('psychrx-link').innerHTML='<a class="button" href="/psychiatry">Abrir implementação PsychRx</a>'}else{const step=steps[index];document.getElementById('step-title').textContent=step.title;document.getElementById('capability').textContent=`Capacidade: ${step.capability}`;notes.value=draft[step.key]||''}}
    nextButton.onclick=async()=>{if(busy)return;if(index===workflow.steps.length){index=0;render();return}save();const stepKey=workflow.steps[index].key;let failed=false;busy=true;render();try{if(!serverSession.completed_step_keys.includes(stepKey)){serverSession=await post(`/api/sessions/${encodeURIComponent(serverSession.session_id)}/advance`,{step_key:stepKey})}index++}catch{failed=true}finally{busy=false;render();if(failed)document.getElementById('counter').textContent='Não foi possível registrar o avanço.'}};
    document.getElementById('previous').onclick=()=>{if(busy)return;save();index=Math.max(0,index-1);render()};
    document.getElementById('clear').onclick=async()=>{if(busy)return;busy=true;render();try{serverSession=await post('/api/sessions',{specialty_key:key});Object.keys(draft).forEach(item=>delete draft[item]);notes.value='';index=0}finally{busy=false;render()}};
    Promise.all([fetch('/api/app-state').then(r=>r.json()),fetch(`/api/workflows/${encodeURIComponent(key)}`).then(r=>{if(!r.ok)throw new Error();return r.json()}),post('/api/sessions',{specialty_key:key})]).then(([state,data,session])=>{workflow=data;serverSession=session;specialty=state.specialties.find(item=>item.key===key);document.getElementById('title').textContent=specialty?`Fluxo — ${specialty.display_name}`:'Fluxo da especialidade';document.getElementById('status').textContent=specialty?.load_status||data.mode;document.getElementById('workspace').hidden=false;render()}).catch(()=>{document.getElementById('status').textContent='não encontrado';document.getElementById('title').textContent='Fluxo não encontrado'});
  </script>
</body>
</html>
