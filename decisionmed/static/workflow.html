<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fluxo | DecisionMEd</title>
  <style>
    :root{font-family:Inter,system-ui,sans-serif;background:#f5f7fb;color:#172033}*{box-sizing:border-box}body{margin:0}main{max-width:900px;margin:auto;padding:28px 24px 56px}a{color:#176b84}.top,.actions,.field-head{display:flex;align-items:center;justify-content:space-between;gap:16px}.tag{border-radius:999px;padding:6px 10px;background:#edf0f5;color:#5b6472;font-size:.78rem;font-weight:700}.notice{background:#fff7df;border:1px solid #ead28a;border-radius:12px;padding:14px 18px}.progress{height:8px;background:#e5eaf1;border-radius:999px;overflow:hidden;margin:24px 0 8px}.bar{height:100%;width:0;background:#176b84;transition:width .2s}.counter,.muted{color:#697386;font-size:.9rem}.panel{background:#fff;border:1px solid #dfe5ef;border-radius:18px;padding:24px;margin-top:18px;box-shadow:0 8px 24px #1f32510f}.field{border:1px solid #dfe5ef;border-radius:12px;padding:16px;margin-top:14px}.field h3{margin:0}.field ul{margin-bottom:0}details{border-top:1px solid #e5eaf1;margin-top:14px;padding-top:12px}summary{cursor:pointer;font-weight:700}.evidence{background:#f8fafc;border-radius:10px;padding:12px;margin-top:10px}.evidence p{margin:7px 0}.actions{margin-top:20px}.group{display:flex;gap:10px}.button{border:0;border-radius:10px;padding:11px 16px;background:#176b84;color:#fff;font:inherit;font-weight:700;cursor:pointer;text-decoration:none}.secondary{background:#e9eef4;color:#29425d}.danger{background:#fff0f0;color:#9b3030}.button:disabled{opacity:.45;cursor:not-allowed}.summary{display:none}.summary li{margin:8px 0}
  </style>
</head>
<body>
  <main>
    <div class="top"><a href="/">← Catálogo</a><span class="tag" id="status">carregando</span></div>
    <h1 id="title">Fluxo da especialidade</h1>
    <p class="notice"><strong>Modo somente referência.</strong> Campos em rascunho são exibidos sem entrada de dados, interpretação, recomendação ou prescrição.</p>
    <div id="workspace" hidden>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="counter" id="counter"></div>
      <section class="panel" id="step-panel">
        <h2 id="step-title"></h2>
        <div class="muted" id="capability"></div>
        <div id="form-reference"></div>
      </section>
      <section class="panel summary" id="summary">
        <h2>Revisão estrutural</h2>
        <p>Nenhum dado de paciente ou decisão clínica foi produzido.</p>
        <ul id="summary-list"></ul><span id="psychrx-link"></span>
      </section>
      <div class="actions">
        <div class="group"><button class="button secondary" id="previous">Anterior</button><button class="button danger" id="clear">Nova sessão</button></div>
        <button class="button" id="next">Próximo</button>
      </div>
    </div>
  </main>
  <script>
    const key=new URLSearchParams(location.search).get('specialty')||'';
    const nextButton=document.getElementById('next');
    let workflow,specialty,serverSession,index=0,busy=false,forms={};
    async function post(url,payload){const response=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});if(!response.ok)throw new Error('session_request_failed');return response.json()}
    async function loadForm(stepKey){const response=await fetch(`/api/form-schemas/${encodeURIComponent(key)}/${encodeURIComponent(stepKey)}`);return response.ok?response.json():null}
    function paragraph(label,value){const node=document.createElement('p');const strong=document.createElement('strong');strong.textContent=`${label}: `;node.append(strong,document.createTextNode(value));return node}
    function evidenceView(source){const box=document.createElement('section');box.className='evidence';const reference=source.locator?document.createElement('a'):document.createElement('span');if(source.locator){reference.href=source.locator;reference.target='_blank';reference.rel='noreferrer'}reference.textContent=source.title;box.append(reference);source.anchors.forEach(anchor=>{const link=document.createElement('a');link.href=anchor.locator;link.target='_blank';link.rel='noreferrer';link.textContent=anchor.section;const line=document.createElement('p');const strong=document.createElement('strong');strong.textContent='Seção específica: ';line.append(strong,link);box.append(line)});box.append(paragraph('Tipo e ano',`${source.evidence_type} · ${source.publication_year}`),paragraph('Qualidade registrada',source.evidence_quality),paragraph('Força registrada',source.recommendation_strength),paragraph('Versão e status',`${source.version} · ${source.status}`),paragraph('Revisão interna',source.reviewed_on),paragraph('Aplicabilidade clínica',source.clinical_applicability),paragraph('Conflitos conhecidos',source.known_conflicts));return box}
    function renderFields(step){const host=document.getElementById('form-reference'),form=forms[step.key];host.replaceChildren();if(!form){const message=document.createElement('p');message.className='muted';message.textContent='Nenhum campo governado disponível para esta etapa.';host.appendChild(message);return}const schema=document.createElement('p');schema.className='muted';schema.textContent=`Schema ${form.version} · status ${form.status} · execução clínica bloqueada`;host.appendChild(schema);form.fields.forEach(field=>{const card=document.createElement('article');card.className='field';const head=document.createElement('div');head.className='field-head';const title=document.createElement('h3');title.textContent=field.label;const tag=document.createElement('span');tag.className='tag';tag.textContent=field.knowledge.status;head.append(title,tag);const fieldMeta=document.createElement('p');fieldMeta.className='muted';fieldMeta.textContent=`${field.value_type} · ${field.required?'obrigatório':'opcional'} · somente referência`;const details=document.createElement('details');const summary=document.createElement('summary');summary.textContent='Base científica e limites';details.append(summary,paragraph('Objeto',`${field.knowledge.official_name} · ${field.knowledge.object_type} · versão ${field.knowledge.version}`),paragraph('Descrição',field.knowledge.description),paragraph('Aplicabilidade',field.knowledge.applicability),paragraph('Limites',field.knowledge.limits));field.knowledge.evidence_sources.forEach(source=>details.appendChild(evidenceView(source)));card.append(head,fieldMeta,details);host.appendChild(card)})}
    function render(){const steps=workflow.steps,review=index===steps.length;document.getElementById('bar').style.width=`${Math.min(index+1,steps.length)/steps.length*100}%`;document.getElementById('counter').textContent=review?'Revisão':`Etapa ${index+1} de ${steps.length}`;document.getElementById('step-panel').style.display=review?'none':'block';document.getElementById('summary').style.display=review?'block':'none';document.getElementById('previous').disabled=busy||index===0;nextButton.disabled=busy;nextButton.textContent=review?'Voltar ao início':index===steps.length-1?'Revisar':'Próximo';if(review){const list=document.getElementById('summary-list');list.replaceChildren();steps.forEach(step=>{const item=document.createElement('li'),count=forms[step.key]?.fields.length||0;item.textContent=`${step.title}: ${count} campo(s) governado(s) em referência`;list.appendChild(item)});if(key==='psychiatry')document.getElementById('psychrx-link').innerHTML='<a class="button" href="/psychiatry">Abrir implementação PsychRx</a>'}else{const step=steps[index];document.getElementById('step-title').textContent=step.title;document.getElementById('capability').textContent=`Capacidade: ${step.capability}`;renderFields(step)}}
    nextButton.onclick=async()=>{if(busy)return;if(index===workflow.steps.length){index=0;render();return}const stepKey=workflow.steps[index].key;let failed=false;busy=true;render();try{if(!serverSession.completed_step_keys.includes(stepKey))serverSession=await post(`/api/sessions/${encodeURIComponent(serverSession.session_id)}/advance`,{step_key:stepKey});index++}catch{failed=true}finally{busy=false;render();if(failed)document.getElementById('counter').textContent='Não foi possível registrar o avanço.'}};
    document.getElementById('previous').onclick=()=>{if(!busy){index=Math.max(0,index-1);render()}};
    document.getElementById('clear').onclick=async()=>{if(busy)return;busy=true;render();try{serverSession=await post('/api/sessions',{specialty_key:key});index=0}finally{busy=false;render()}};
    async function start(){const [state,data,session]=await Promise.all([fetch('/api/app-state').then(r=>r.json()),fetch(`/api/workflows/${encodeURIComponent(key)}`).then(r=>{if(!r.ok)throw new Error();return r.json()}),post('/api/sessions',{specialty_key:key})]);workflow=data;serverSession=session;const loaded=await Promise.all(data.steps.map(async step=>[step.key,await loadForm(step.key)]));forms=Object.fromEntries(loaded);specialty=state.specialties.find(item=>item.key===key);document.getElementById('title').textContent=specialty?`Fluxo — ${specialty.display_name}`:'Fluxo da especialidade';document.getElementById('status').textContent=specialty?.load_status||data.mode;document.getElementById('workspace').hidden=false;render()}
    start().catch(()=>{document.getElementById('status').textContent='não encontrado';document.getElementById('title').textContent='Fluxo não encontrado'});
  </script>
</body>
</html>
