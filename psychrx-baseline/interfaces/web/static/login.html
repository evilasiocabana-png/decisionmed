<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>Acesso protegido | PsychRx</title>
    <style>
      :root { color-scheme: light; font-family: Inter, "Segoe UI", Arial, sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #eef4f3; color: #142033; }
      main { width: min(420px, 100%); padding: 28px; border: 1px solid #dbe4eb; border-radius: 8px; background: #fff; box-shadow: 0 18px 42px rgba(20,35,52,.10); }
      .brand { margin: 0 0 8px; color: #0f766e; font-size: .78rem; font-weight: 900; text-transform: uppercase; }
      h1 { margin: 0 0 8px; font-size: 1.65rem; }
      p { margin: 0 0 22px; color: #637083; line-height: 1.45; }
      label { display: grid; gap: 7px; font-weight: 800; }
      input { width: 100%; min-height: 48px; border: 1px solid #b9c8d2; border-radius: 7px; padding: 0 13px; font: inherit; }
      input:focus { outline: 3px solid rgba(15,118,110,.18); border-color: #0f766e; }
      button { width: 100%; min-height: 48px; margin-top: 14px; border: 0; border-radius: 7px; background: #0f766e; color: #fff; font: inherit; font-weight: 900; cursor: pointer; }
      .error { display: none; margin: 0 0 14px; padding: 10px 12px; border-radius: 7px; background: #fff1ef; color: #b42318; font-weight: 800; }
      body[data-error="true"] .error { display: block; }
      small { display: block; margin-top: 18px; color: #637083; line-height: 1.4; }
    </style>
  </head>
  <body>
    <main>
      <p class="brand">PsychRx</p>
      <h1>Área clínica protegida</h1>
      <p>Acesso restrito a profissionais autorizados.</p>
      <p class="error" role="alert">Senha incorreta. Verifique e tente novamente.</p>
      <form method="post" action="/login">
        <label>
          Senha de acesso
          <input name="password" type="password" autocomplete="current-password" required autofocus />
        </label>
        <button type="submit">Entrar no PsychRx</button>
      </form>
      <small>Os dados do caso não são gravados por esta tela de acesso.</small>
    </main>
    <script>
      document.body.dataset.error = new URLSearchParams(location.search).get("error") === "1";
    </script>
  </body>
</html>
